<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🐉 Dragon Walk Animation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b1120;color:#e2e8f0;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
h1{font-size:20px;margin-bottom:4px}
.sub{font-size:12px;color:#5a6d85;margin-bottom:20px}
.gif-box{background:#1e2a45;border-radius:16px;padding:20px;border:1px solid #1e2a45}
.gif-box img{display:block;width:256px;height:auto;image-rendering:pixelated;border-radius:8px}
.info{font-size:11px;color:#5a6d85;margin-top:12px;text-align:center;line-height:1.6}
.frames{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;justify-content:center}
.frames img{width:64px;height:64px;image-rendering:pixelated;border-radius:6px;border:2px solid #1e2a45;background:#0b1120}
</style>
</head>
<body>
<h1>🐉 #小龍 PICO-8 行路動畫</h1>
<div class="sub">4 frames x 6 格 cycle (Loop)</div>
<div class="gif-box">
  <img src="/pixel-gen/dragon_walk.gif" alt="Dragon walking animation">
</div>
<div class="info">
  6 frames cycle · 每格 150ms · PICO-8 16色 palette
</div>
<div class="frames">
  <img src="/pixel-gen/fr_dragon_walk1.png">
  <img src="/pixel-gen/fr_dragon_walk2.png">
  <img src="/pixel-gen/fr_dragon_walk3.png">
  <img src="/pixel-gen/fr_dragon_walk4.png">
</div>
</body>
</html>
