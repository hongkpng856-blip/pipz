<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Pipz AI Pixel Art Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b1120;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;padding:20px;min-height:100vh}
h1{font-size:20px;margin-bottom:4px}
.sub{font-size:11px;color:#5a6d85;margin-bottom:20px}
.grid{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.card{background:#141b2d;border:1px solid #1e2a45;border-radius:14px;padding:16px;text-align:center;width:180px}
.card img{width:140px;height:140px;object-fit:contain;image-rendering:pixelated;border-radius:8px;margin-bottom:8px;background:#1e2a45}
.card .name{font-size:14px;font-weight:700;color:#f0f4f8}
.card .species{font-size:10px;color:#5a6d85;margin-top:2px}
.card .badge{display:inline-block;font-size:9px;padding:2px 12px;border-radius:10px;margin-top:6px;font-weight:700}
.arcade{background:rgba(34,197,94,0.15);color:#22c55e}
.nes{background:rgba(139,92,246,0.15);color:#a855f7}
.pico8{background:rgba(245,158,11,0.15);color:#f59e0b}
.section-title{margin:24px 0 12px;font-size:13px;color:#94a5b8}
</style>
</head>
<body>
<h1>🎨 Pipz AI-Generated Pixel Art</h1>
<div class="sub">用 Pollinations.ai 生成 + pixel-art skill 轉換嘅 5 種寵物</div>

<div id="app"></div>

<script>
const species = [
  {name:'圓貓', emoji:'🐱', file:'cat_arcade.png', badge:'Arcade 16色', cls:'arcade'},
  {name:'小狗', emoji:'🐶', file:'dog_nes.png', badge:'NES 8-bit', cls:'nes'},
  {name:'小龍', emoji:'🐉', file:'dragon_pico8.png', badge:'PICO-8', cls:'pico8'},
  {name:'史萊姆', emoji:'🟢', file:'slime_arcade.png', badge:'Arcade 16色', cls:'arcade'},
  {name:'機械人', emoji:'🤖', file:'robot_nes.png', badge:'NES 8-bit', cls:'nes'},
];

const app = document.getElementById('app');
const grid = document.createElement('div');
grid.className = 'grid';
app.appendChild(grid);

species.forEach(s => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <img src="/pixel-gen/${s.file}" alt="${s.name}">
    <div class="name">${s.emoji} #${s.name}</div>
    <div class="species">${s.badge} 風格</div>
    <span class="badge ${s.cls}">${s.badge}</span>`;
  grid.appendChild(card);
});

// Also show current versions for comparison
const h2 = document.createElement('div');
h2.className = 'section-title';
h2.textContent = '↓ 目前版本 (手畫 16×16 grid) — 可以同上面 AI 生成嘅比較';
app.appendChild(h2);

</script>
</body>
</html>
