<title>Pipz Pixel Art Redesign Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0b1120; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif;
  padding: 16px; min-height: 100vh;
}
h1 { font-size: 20px; margin-bottom: 2px; }
.sub { font-size: 11px; color: #5a6d85; margin-bottom: 20px; }
.species-section { margin-bottom: 32px; }
.species-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #1e2a45;
}
.species-header h2 { font-size: 16px; font-weight: 700; }
.species-header .emoji { font-size: 20px; }
.style-grid {
  display: flex; gap: 16px; flex-wrap: wrap;
}
.style-card {
  background: #141b2d; border: 1px solid #1e2a45; border-radius: 14px;
  padding: 14px; text-align: center; width: 158px; cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.style-card:hover { border-color: #8b5cf6; }
.style-card.selected { border-color: #8b5cf6; box-shadow: 0 0 12px rgba(139,92,246,0.3); }
.style-card canvas {
  display: block; margin: 0 auto 6px; border-radius: 4px;
  image-rendering: pixelated; width: 120px; height: 120px;
}
.style-card .sname { font-size: 12px; font-weight: 700; color: #f0f4f8; }
.style-card .sdesc { font-size: 9px; color: #5a6d85; margin-top: 2px; }
.style-card .sbadge {
  display: inline-block; font-size: 8px; padding: 2px 10px;
  border-radius: 8px; margin-top: 4px; font-weight: 700;
}
.badge-curr { background: #1e2a45; color: #5a6d85; }
.badge-new { background: rgba(34,197,94,0.15); color: #22c55e; }
.badge-det { background: rgba(139,92,246,0.15); color: #a855f7; }
.badge-chibi { background: rgba(245,158,11,0.15); color: #f59e0b; }

#result-box {
  margin-top: 20px; padding: 16px; border-radius: 14px;
  border: 1px solid #8b5cf6; background: rgba(139,92,246,0.08);
  display: none;
}
#result-box.show { display: block; }
#result-box .rtitle { font-size: 13px; font-weight: 700; color: #c084fc; margin-bottom: 4px; }
#result-box .rdesc { font-size: 11px; color: #94a5b8; }

.btn-generate {
  display: inline-block; margin-top: 16px;
  padding: 10px 32px; background: #8b5cf6; color: white;
  border: none; border-radius: 12px; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit;
}
.btn-generate:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>

<h1>🎨 Pipz Pixel Art 重新設計</h1>

<div id="app"></div>

<div id="result-box">
  <div class="rtitle">✨ 已揀選風格</div>

function drawAnimal(canvas, grid, pal, px) {
  const ctx = canvas.getContext('2d');
  const h = grid.length, w = grid[0].length;
  const sz = px || 4;
  canvas.width = w * sz + 2 * sz;
  canvas.height = h * sz + 2 * sz;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.imageSmoothingEnabled = false;

  // Build with outline
  const g = grid.map(r => [...r]);
  for (let y=0; y<h; y++) for (let x=0; x<w; x++) {
    if (g[y][x]==='_'||g[y][x]==='') continue;
    for (const [ny,nx] of [[y-1,x],[y+1,x],[y,x-1],[y,x+1]]) {
      if (ny<0||ny>=h||nx<0||nx>=w) continue;
      if (g[ny][nx]==='_'||g[ny][nx]==='') g[ny][nx]=pal.o;
    }
  }

  const ox = sz, oy = sz;
  for (let y=0; y<h; y++) for (let x=0; x<w; x++) {
    const c = g[y][x];
    if (!c || c==='_') continue;
    switch(c) {
      case 'p': ctx.fillStyle = pal.p; break;
      case 's': ctx.fillStyle = pal.s; break;
      case 'a': ctx.fillStyle = pal.a; break;
      case 'o': ctx.fillStyle = pal.o; break;
      case 'e': ctx.fillStyle = pal.e; break;
      case 'n': ctx.fillStyle = pal.n; break;
      default: ctx.fillStyle = pal.p;
    }
    ctx.fillRect(ox + x*sz, oy + y*sz, sz, sz);
  }
}

// ─── Build UI ───
const styles = [
  { key:'curr', label:'目前版本', badge:'現有', cls:'badge-curr' },
  { key:'A', label:'Style A',  badge:'特徵強化', cls:'badge-new', desc:'更明顯動物特徵' },
  { key:'B', label:'Style B',  badge:'更細緻',   cls:'badge-det', desc:'24×24 高解析度' },
  { key:'C', label:'Style C',  badge:'Q版大眼', cls:'badge-chibi', desc:'可愛大眼風格' },
];

const species = [
  { id:'cat',    name:'圓貓',   emoji:'🐱', pal: PAL.cat },
  { id:'dog',    name:'小狗',   emoji:'🐶', pal: PAL.dog },
  { id:'dragon', name:'小龍',   emoji:'🐉', pal: PAL.dragon },
  { id:'slime',  name:'史萊姆', emoji:'🟢', pal: PAL.slime },
  { id:'robot',  name:'機械人', emoji:'🤖', pal: PAL.robot },
];

let choices = {};

const app = document.getElementById('app');

species.forEach(sp => {
  const sec = document.createElement('div');
  sec.className = 'species-section';
  sec.innerHTML = `<div class="species-header">
    <span class="emoji">${sp.emoji}</span>
    <h2>#${sp.name}</h2>
  </div><div class="style-grid" id="grid-${sp.id}"></div>`;
  app.appendChild(sec);

  const grid = sec.querySelector('.style-grid');

  styles.forEach((st, si) => {
    const key = `${sp.id}_${st.key}`;
    const gridData = G[key];
    if (!gridData) return;

    const card = document.createElement('div');
    card.className = 'style-card';
    card.dataset.species = sp.id;
    card.dataset.style = st.key;
    card.innerHTML = `<canvas id="cvs-${key}"></canvas>
      <div class="sname">${st.label}</div>
      <div class="sdesc">${st.desc||''}</div>
      <span class="sbadge ${st.cls}">${st.badge}</span>`;
    grid.appendChild(card);

    const cvs = card.querySelector('canvas');
    drawAnimal(cvs, gridData, sp.pal, st.key==='B'?3:4);

    card.addEventListener('click', () => {
      document.querySelectorAll(`#grid-${sp.id} .style-card`).forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      choices[sp.id] = st.key;
      updateResult();
    });
  });
});

function updateResult() {
  const all = ['cat','dog','dragon','slime','robot'];
  const allChosen = all.every(s => choices[s]);
  document.getElementById('genBtn').disabled = !allChosen;
  if (allChosen) {
    const counts = {};
    all.forEach(s => { const k = choices[s]; counts[k] = (counts[k]||0)+1; });
    const mainStyle = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
    const styleNames = { curr:'目前版本', A:'特徵強化 (Style A)', B:'更細緻 (Style B)', C:'Q版大眼 (Style C)' };
    document.getElementById('result-box').classList.add('show');
    document.getElementById('result-text').innerHTML =
      `多數選擇：<strong>${styleNames[mainStyle]}</strong><br>全部已揀，可以生成！`;
  }
}

function confirmChoice() {
  const styleNames = { A:'特徵強化 (Style A)', B:'更細緻 (Style B)', C:'Q版大眼 (Style C)', curr:'目前版本' };
  let msg = '你揀咗：\n';
  for (const [sp, st] of Object.entries(choices)) {
    const name = species.find(s=>s.id===sp)?.name||sp;
    msg += `  #${name} → ${styleNames[st]||st}\n`;
  }
  document.getElementById('result-text').innerHTML = msg.replace(/\n/g,'<br>') +
    '<br><span style="color:#22c55e;font-weight:700">✅ 收到！我會根據呢啲風格重新設計全部 50 種動物</span>';
}
