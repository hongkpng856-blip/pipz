<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Pipz - Modal Animation Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0b1120; color: #f0f4f8;
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100dvh;
    display: flex; flex-direction: column;
  }
  .app {
    flex: 1; display: flex; flex-direction: column;
    max-width: 400px; margin: 0 auto; width: 100%;
    position: relative;
  }
  .header {
    background: #0f172a; padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #1e293b;
  }
  .header-title { font-size: 18px; font-weight: 800; color: #a855f7; }
  .main {
    flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 12px;
  }
  .btn {
    background: #1a2338; border: 1px solid #2a3a5a;
    color: #f0f4f8; padding: 12px 20px; border-radius: 14px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: inherit; text-align: center;
    transition: background 0.15s;
  }
  .btn:hover { background: #23304a; }
  .btn-primary { background: #a855f7; border-color: #a855f7; color: #fff; }
  .btn-primary:hover { background: #9333ea; }

  /* ── ANIMATION (same as actual Pipz modal code) ── */
  .modal-portal-wrapper {
    position: fixed; inset: 0; z-index: 9999; isolation: isolate;
    pointer-events: none;
  }
  .modal-portal-wrapper > * {
    pointer-events: auto;
    opacity: 0;
    transform: scale(0.92) translateY(16px) translateZ(0);
    transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .modal-portal-wrapper[data-entered=true] > * {
    opacity: 1;
    transform: scale(1) translateY(0) translateZ(0);
  }

  .modal-overlay {
    position: fixed; inset: 0; z-index: 9998;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-card {
    background: #141b2d; border: 1px solid #2a3a5a; border-radius: 20px;
    padding: 24px; max-width: 300px; width: 100%;
    text-align: center;
  }
  .modal-card h2 { font-size: 18px; margin-bottom: 8px; color: #a855f7; }
  .modal-card p { font-size: 12px; color: #94a5b8; line-height: 1.5; margin-bottom: 16px; }

  .bottom-nav {
    background: #0f172a; border-top: 1px solid #1e293b; padding: 6px 0 12px;
  }
  .nav-grid {
    display: flex; justify-content: space-around; padding: 0 8px;
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center;
    background: none; border: none; cursor: pointer;
    font-family: inherit; gap: 2px; padding: 4px 12px;
    border-radius: 12px; transition: background 0.15s;
  }
  .nav-btn:active { background: rgba(168,85,247,0.1); }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 9px; font-weight: 600; color: #5a6d85; }
  .nav-label.active { color: #a855f7; }
  .nav-icon.active { filter: drop-shadow(0 0 4px rgba(168,85,247,0.3)); }

  .badge {
    display: inline-block;
    background: #f59e0b; color: #0b1120;
    font-size: 8px; font-weight: 800; padding: 2px 6px;
    border-radius: 5px; letter-spacing: 0.3px;
  }

  .demo-controls {
    display: flex; flex-direction: column; gap: 8px;
    margin-top: auto;
  }
  .demo-note {
    font-size: 10px; color: #5a6d85; text-align: center;
    padding: 16px 0;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="header-title">Pipz</span>
    <span style="font-size:10px;color:#5a6d85">👣 0</span>
  </div>

  <div class="main">
    <div style="text-align:center;padding:24px 0;color:#5a6d85;font-size:13px">
      <div style="font-size:48px;margin-bottom:12px">🐾</div>
      <div style="font-size:20px;font-weight:700;color:#f0f4f8">Modal Animation Demo</div>
      <div style="font-size:11px;color:#94a5b8;margin-top:4px">tap button → animation → smooth entrance</div>
    </div>

    <div class="demo-controls">
      <button class="btn btn-primary" onclick="openModal('login')">🔑 Login Modal</button>
      <button class="btn" onclick="openModal('event')">🎲 Event Modal</button>
      <button class="btn" onclick="openModal('pet')">🐾 Pet Detail Modal</button>
      <button class="btn" onclick="openModal('egg')">🥚 Egg Found Modal</button>
      <button class="btn" onclick="openModal('newpet')">🎉 New Pet Popup</button>
      <div class="demo-note">👇 下面 navbar 係假嘅，用嚟展示 full app context</div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-grid">
      <button class="nav-btn"><span class="nav-icon active">🗺️</span><span class="nav-label active">地圖</span></button>
      <button class="nav-btn"><span class="nav-icon">🐾</span><span class="nav-label inactive">寵物</span></button>
      <button class="nav-btn"><span class="nav-icon">🥚</span><span class="nav-label inactive">蛋</span></button>
      <button class="nav-btn"><span class="nav-icon">🏪</span><span class="nav-label inactive">社群</span></button>
      <button class="nav-btn"><span class="nav-icon">🎒</span><span class="nav-label inactive">背包</span></button>
    </div>
  </div>
</div>

<div id="modal-root"></div>

<script>
function openModal(type) {
  const root = document.getElementById('modal-root');
  const modalHtml = getModalContent(type);

  // Render invisible, then animate in (same technique as ModalPortal.tsx)
  root.innerHTML = `
    <div class="modal-portal-wrapper" data-entered="false">
      ${modalHtml}
    </div>
  `;

  // Double rAF → trigger transition (same as React code)
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const wrapper = root.querySelector('.modal-portal-wrapper');
      if (wrapper) wrapper.dataset.entered = 'true';
    });
  });
}

function closeModal() {
  const root = document.getElementById('modal-root');
  const wrapper = root.querySelector('.modal-portal-wrapper');
  if (wrapper) {
    wrapper.dataset.entered = 'false';
    setTimeout(() => { root.innerHTML = ''; }, 300);
  } else {
    root.innerHTML = '';
  }
}

function getModalContent(type) {
  const modals = {
    login: `
      <div class="modal-overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
          <div style="font-size:40px;margin-bottom:12px">🔑</div>
          <h2>Login</h2>
          <p>登入以同步寵物資料<br/>跨裝置繼續冒險</p>
          <button class="btn btn-primary" style="width:100%" onclick="closeModal()">Login with Email</button>
          <button class="btn" style="width:100%;margin-top:8px" onclick="closeModal()">Cancel</button>
        </div>
      </div>
    `,
    event: `
      <div class="modal-overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
          <div style="font-size:40px;margin-bottom:12px">🎲</div>
          <div style="font-size:10px;font-weight:800;text-transform:uppercase;color:#ef4444;background:rgba(239,68,68,0.12);padding:2px 10px;border-radius:10px;display:inline-block;margin-bottom:8px">⚠️ 負面事件</div>
          <h2 style="font-size:16px">絆倒石頭</h2>
          <p>你踩到一塊尖石，寵物嚇了一跳<br/>體力 -5</p>
          <button class="btn btn-primary" style="width:100%" onclick="closeModal()">繼續</button>
        </div>
      </div>
    `,
    pet: `
      <div class="modal-overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
          <div style="font-size:40px;margin-bottom:12px">🐱</div>
          <span class="badge" style="margin-bottom:8px">NEW</span>
          <h2>小虎</h2>
          <p>LV.3 • 冒險者<br/>可愛嘅貓貓寵物</p>
          <button class="btn" style="width:100%" onclick="closeModal()">關閉</button>
        </div>
      </div>
    `,
    egg: `
      <div class="modal-overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
          <div style="font-size:64px;margin-bottom:12px;animation:pulse 0.5s ease-in-out infinite">🥚</div>
          <h2 style="color:#f59e0b">發現咗一粒蛋！</h2>
          <p>行路途中你發現咗一粒閃閃發光嘅蛋<br/>行多 200 步就會孵化！</p>
          <button class="btn btn-primary" style="width:100%" onclick="closeModal()">太好了！</button>
        </div>
      </div>
    `,
    newpet: `
      <div class="modal-overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
          <div style="font-size:64px;margin-bottom:12px">🎉</div>
          <h2 style="color:#f59e0b">新寵物誕生！</h2>
          <div style="font-size:48px;margin:12px 0">🐣</div>
          <p>一粒新生命誕生咗！<br/>佢需要你帶佢去冒險！</p>
          <button class="btn btn-primary" style="width:100%" onclick="closeModal()">接住！</button>
        </div>
      </div>
    `
  };
  return modals[type] || modals.login;
}

// Add keyframe for egg pulse
const style = document.createElement('style');
style.textContent = `@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.1); } }`;
document.head.appendChild(style);
</script>
</body>
</html>
